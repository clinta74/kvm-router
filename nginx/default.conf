server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # API proxy — must come before the SPA catch-all
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Dynamically-generated KVM host proxy blocks
    # Written by the Node.js API whenever hosts are added/edited/deleted
    include /etc/nginx/kvm-hosts.conf;

    # Catch-all for /kvm/ — shown when no host slug matched above
    location /kvm/ {
        default_type text/html;
        return 404 '<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Host Not Found – KVM Router</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;align-items:center;justify-content:center;min-height:100vh}.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2.5rem 3rem;text-align:center;max-width:420px}h1{font-size:3rem;color:#00b4d8;margin-bottom:.5rem}h2{font-size:1.25rem;margin-bottom:1rem}p{color:#8b949e;margin-bottom:1.5rem}a{display:inline-block;padding:.6rem 1.4rem;background:#00b4d8;color:#0d1117;border-radius:6px;text-decoration:none;font-weight:600}a:hover{background:#0096b7}</style></head><body><div class="card"><h1>404</h1><h2>Host Not Found</h2><p>The KVM host you requested is not configured in this router.</p><a href="/">Back to Dashboard</a></div></body></html>';
    }

    # Static assets — long-lived cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
    }

    # SPA fallback — must be last
    location / {
        try_files $uri $uri/ /index.html;
    }
}
